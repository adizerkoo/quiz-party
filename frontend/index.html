<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz Party 🎉 — Главная</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/menu.css">
</head>
<body class="party-bg">

    <div class="balloon balloon-1"></div>
    <div class="balloon balloon-2"></div>
    <div class="balloon balloon-3"></div>

    <div class="main-container">
        <div class="party-card menu-card">
            <div class="logo-area">
                <h1 class="party-title">QUIZ PARTY</h1>
                <p class="party-subtitle reveal-anim-delay">Твой праздник — твои правила!</p>
            </div>

            <div class="menu-grid">
                <div class="menu-item create" onclick="location.href='create.html'">
                    <div class="menu-icon">🎨</div>
                    <div class="menu-text">
                        <span class="menu-label">Я организатор</span>
                        <span class="menu-desc">Создать новый квиз</span>
                    </div>
                </div>

                <div class="menu-item join" onclick="openJoinModal()">
                    <div class="menu-icon">🎮</div>
                    <div class="menu-text">
                        <span class="menu-label">Я игрок</span>
                        <span class="menu-desc">Войти в комнату</span>
                    </div>
                </div>
            </div>

            <div class="footer-info">
                Сделано для крутых вечеринок ✨
            </div>
        </div>
    </div>

    <div id="join-modal" class="modal">
        <div class="modal-content light-glass-card">
            <div class="modal-header">
                <h3>Вход в игру</h3>
                <p>Введи данные, чтобы начать веселье</p>
            </div>
            
            <div class="portal-inputs">
                <div class="modern-field" id="field-name">
                    <input type="text" id="player-name" maxlength="15" placeholder=" " required>
                    <label>Твое имя</label>
                    <span class="field-icon">👤</span>
                    <div class="field-border"></div>
                </div>
                <span class="input-hint" id="hint-name">Пожалуйста, представься 🎭</span> <div class="modern-field" id="field-code">
                    <input type="text" id="room-code" placeholder=" " required>
                    <label>Код комнаты</label>
                    <span class="field-icon">🔑</span>
                    <div class="field-border"></div>
                </div>
                <span class="input-hint" id="hint-code">Нужен код, чтобы войти 🚪</span>
            </div>

            <button onclick="startJoining()" class="btn-modern-join">
                <span>ПОГНАЛИ! 🚀</span>
            </button>
            
            <button onclick="closeJoinModal()" class="btn-cancel-link">Вернуться назад</button>
        </div>
    </div>

    <script src="js/menu.js"></script>
</body>
</html>

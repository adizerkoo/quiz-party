<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz Party - Battle Royale</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/game.css">
</head>
<body class="party-bg">
    <div class="balloon balloon-1"></div>
    <div class="balloon balloon-2"></div>
    <div class="balloon balloon-3"></div>

    <div class="main-container">
        
        <div id="host-screen" class="party-card" style="display: none;">
            <div id="host-lobby">
                <span class="emoji-logo">🎉</span>
                <h1 class="party-title">ЖДЕМ ГОСТЕЙ</h1>
                <p class="party-subtitle">Код комнаты: <span id="display-room-code" style="color: var(--party-purple); font-weight: 800;"></span></p>
                <div id="lobby-players-list" class="party-scroll-list"></div>
                <button onclick="startGame()" class="btn-party-direct" style="margin-top: 20px;">ПОГНАЛИ! 🚀</button>
            </div>

            <div id="host-game-area" style="display: none;">
                <h1 id="host-question-text" class="party-title" style="font-size: 1.5rem; margin-bottom: 20px;"></h1>
                <div id="players-answers-grid" class="party-scroll-list"></div>
                
                <div style="display: flex; gap: 10px; margin-top: 25px;">
                    <button onclick="prevQuestion()" class="btn-party-main" style="background: #b2bec3; flex: 1;">⬅️ НАЗАД</button>
                    <button id="next-btn" onclick="nextQuestion()" class="btn-party-main" style="background: var(--party-purple); flex: 2;">ДАЛЬШЕ ➡️</button>
                </div>
            </div>
        </div>

        <div id="player-screen" class="party-card" style="display: none;">
            <div id="player-wait">
                <span class="emoji-logo">🎈</span>
                <h1 class="party-title">ТЫ В ИГРЕ!</h1>
                <p class="party-subtitle">Ждем, пока организатор начнет раунд...</p>
            </div>

            <div id="player-game-area" style="display: none;">
                <h1 id="player-question-text" class="party-title" style="font-size: 1.4rem;"></h1>
                <div id="player-answer-area"></div>
            </div>
        </div>

        <div id="finish-screen" class="party-card" style="display: none;">
            <span class="emoji-logo">👑</span>
            <h1 class="party-title">ФИНИШ!</h1>
            <div id="final-results-list" class="list-zone"></div>
            <button onclick="location.href='index.html'" class="btn-party-direct" style="margin-top:20px">В ГЛАВНОЕ МЕНЮ</button>
        </div>

    </div>

    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script src="js/game.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Создание Quiz Party</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/create/index.css">
</head>
<body class="party-bg create-page">
    <div id="toast-container"></div>
    <div class="balloon balloon-1"></div>
    <div class="balloon balloon-2"></div>
    <div class="balloon balloon-3"></div>

    <div class="main-container">
        <div class="party-card">
            <div class="header-nav">
                <a href="index.html" class="btn-back">← Назад</a>
                <h1 class="party-title">QUIZ PARTY</h1>
            </div>
            
            <div class="input-group main-title-group">
                <label>Название вечеринки:</label>
                <input type="text" id="quiz-title-input" maxlength="50" placeholder="Например: ДР Артёма 🎂" class="main-title-input">
            </div>

            <div class="creation-zone">
               <div class="input-group">
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
                        <label style="margin: 0;">Твой вопрос</label>
                        <button type="button" class="btn-inline-library" onclick="toggleLibrary()">
                            <i class="fa-solid fa-book-open"></i> Все идеи
                        </button>
                    </div>

                    <input type="text" id="q-input-text" placeholder="Например: В каком году вышел первый iPhone?">
                    
                    <div class="idea-wrapper" style="display: flex; align-items: center; gap: 8px;">
                        <div id="idea-container" class="idea-container" style="flex-grow: 1;">
                            <i class="fas fa-lightbulb idea-icon"></i> Идея: <span id="random-idea-text">Загрузка...</span>
                        </div>
                        <button id="refresh-idea" class="refresh-btn" title="Другой вопрос">
                            <i class="fas fa-sync-alt"></i>
                        </button>
                    </div>
                </div>

                <div class="input-group">
                    <label>Тип ответа:</label>
                    <div class="type-selector">
                        <div class="type-option" onclick="selectType('text', this)">
                            <i class="fa-solid fa-pen"></i> Текст
                        </div>
                        <div class="type-option active" onclick="selectType('options', this)">
                            <i class="fa-solid fa-circle-dot"></i> Выбор
                        </div>
                        <input type="hidden" id="q-input-type" value="options">
                    </div>
                </div>

                <div id="options-fields" class="options-creation-zone" style="display: block;">
                    <div class="input-group">
                        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
                            <label style="margin:0;">Отметь правильный вариант:</label>
                            <button type="button" class="btn-clear-options" onclick="clearOptions()">
                                <i class="fa-solid fa-broom"></i>
                                Очистить
                            </button>
                        </div>
                        
                        <div id="options-list"></div>

                        <button type="button" id="btn-add-option" class="btn-add-option" onclick="addOptionRow()">
                            <i class="fa-solid fa-plus"></i> Добавить вариант
                        </button>
                    </div>
                </div>

                <div id="correct-answer-zone" class="input-group" style="display: none;">
                    <label>Ответ:</label>
                    <div class="input-with-clear correct-text">
                        <input type="text" id="q-input-correct" class="opt-input">
                        <span class="clear-input" onclick="clearSingleInput(this)">×</span>
                    </div>
                </div>

                <button id="add-btn" onclick="addQuestionToList()" class="btn-party-add">ДОБАВИТЬ ВОПРОС</button>
            </div>

            <div class="list-zone">
                <div class="questions-header">
                    <div class="questions-title">
                        Вопросы
                    </div>
                    <div class="questions-count">
                        <span id="q-count">0</span>
                    </div>
                </div>
                <div id="questions-list" class="party-scroll-list"></div>
            </div>

            <button onclick="saveAndGo()" class="btn-party-launch">
                <span class="btn-glow"></span>
                <span class="btn-content">🚀 ЗАЖЕЧЬ ВЕЧЕРИНКУ!</span>
            </button>
        </div>
    </div>
    <!-- JS модули создания викторины -->
    <script src="js/shared/user-profile.js"></script>
    <script src="js/create/state.js"></script>
    <script src="js/create/utils.js"></script>
    <script src="js/create/storage.js"></script>
    <script src="js/create/form.js"></script>
    <script src="js/create/questions-list.js"></script>
    <script src="js/create/ideas.js"></script>
    <script src="js/create/library.js"></script>
    <script src="js/create/save-and-go.js"></script>
    <script src="js/create/init.js"></script>
    <div id="library-modal" class="modal-overlay">
        <div class="modal-content">
            <div class="modal-header">
                <h2>💡 Готовые вопросы</h2>
                <button class="close-modal" onclick="toggleLibrary()">×</button>
            </div>
            <div class="library-filter">
                <button class="filter-btn active" data-category="all" onclick="filterLibrary('all')">Все</button>
                <button class="filter-btn" data-category="about-me" onclick="filterLibrary('about-me')">Обо мне</button>
                <button class="filter-btn" data-category="funny" onclick="filterLibrary('funny')">Юмор</button>
                <button class="filter-btn" data-category="music" onclick="filterLibrary('music')">Музыка</button>
                <button class="filter-btn" data-category="sports" onclick="filterLibrary('sports')">Спорт</button>
                <button class="filter-btn" data-category="movie" onclick="filterLibrary('movie')">Фильмы</button>
                <button class="filter-btn" data-category="friends" onclick="filterLibrary('friends')">О нас</button>
            </div>
            <div id="library-list" class="library-items-container">
                </div>
        </div>
    </div>    
</body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Создание Квиза</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/admin.css">
</head>
<body class="party-bg">
    <div id="toast-container"></div>
    <div class="balloon balloon-1"></div>
    <div class="balloon balloon-2"></div>
    <div class="balloon balloon-3"></div>

    <div class="main-container">
        <div class="party-card">
            <h1 class="party-title">QUIZ PARTY</h1>
            
            <div class="input-group main-title-group">
                <label>Название вечеринки:</label>
                <input type="text" id="quiz-title-input" placeholder="Например: ДР Артёма 🎂" class="main-title-input">
            </div>

            <div class="creation-zone">
                <div class="input-group">
                    <label>Твой вопрос:</label>
                    <input type="text" id="q-input-text" placeholder="Кто тут именинник?">
                </div>

                <div class="input-group">
                    <label>Тип ответа:</label>
                    <div class="type-selector">
                        <div class="type-option" onclick="selectType('text', this)">
                            <span class="type-icon">📝</span> Текст
                        </div>
                        <div class="type-option active" onclick="selectType('options', this)">
                            <span class="type-icon">🔘</span> Выбор
                        </div>
                        <input type="hidden" id="q-input-type" value="options">
                    </div>
                </div>

                <div id="options-fields" class="options-creation-zone">
                    <p class="section-hint">Отметь правильный вариант:</p>
                    <div class="opt-create-row"><input type="text" id="opt-1" placeholder="Вариант 1" class="opt-input"> <input type="radio" name="correct-opt" value="0" checked></div>
                    <div class="opt-create-row"><input type="text" id="opt-2" placeholder="Вариант 2" class="opt-input"> <input type="radio" name="correct-opt" value="1"></div>
                    <div class="opt-create-row"><input type="text" id="opt-3" placeholder="Вариант 3" class="opt-input"> <input type="radio" name="correct-opt" value="2"></div>
                    <div class="opt-create-row"><input type="text" id="opt-4" placeholder="Вариант 4" class="opt-input"> <input type="radio" name="correct-opt" value="3"></div>
                </div>

                <div id="correct-answer-zone" class="input-group" style="display: none;">
                    <label>Правильный ответ:</label>
                    <input type="text" id="q-input-correct" placeholder="Введите текст ответа">
                </div>

                <button onclick="addQuestionToList()" class="btn-party-add">ДОБАВИТЬ ВОПРОС</button>
            </div>

            <hr class="party-hr">

            <div class="list-zone">
                <h3 class="list-title">Вопросы (<span id="q-count">0</span>)</h3>
                <div id="questions-list" class="party-scroll-list">
                    <div class="empty-list-msg">Добавьте первый вопрос!</div>
                </div>
            </div>

            <button onclick="saveAndGo()" class="btn-party-launch">
                <span class="btn-glow"></span>
                <span class="btn-content">🚀 ЗАЖЕЧЬ ВЕЧЕРИНКУ!</span>
            </button>
        </div>
    </div>
    <script src="js/admin.js"></script>
</body>
</html>
